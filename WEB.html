
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment System</title>

  <style>
    body { font-family: Arial; background:#f4f4f4; padding:20px; }
    .container { background:#fff; padding:20px; max-width:820px; margin:auto; border-radius:10px; }
    .hidden { display:none; }
    .red { color:red; font-weight:bold; }
    label { display:block; margin-top:10px; }
    input, select { width:100%; padding:8px; margin-top:5px; box-sizing:border-box; }
    button { margin-top:10px; padding:10px; width:100%; background:#0078D7; color:white; border:none; border-radius:6px; cursor:pointer; }
    .secondary { background:#444; }
    .warning { background:#b42318; }
    .success { background:#1a7f37; }
    hr { margin:16px 0; border:none; border-top:1px solid #ddd; }
    .box { margin-top:10px; padding:10px; border:1px dashed #999; background:#fffdf2; border-radius:8px; }
    .card { margin-top:12px; padding:12px; border:1px solid #e6e6e6; background:#fafafa; border-radius:10px; }
  </style>
</head>

<body>

<!-- ================= USER PAGE ================= -->
<div id="userPage" class="container">
  <h2>Payment Entry Form</h2>
  <div class="red">* Fields are mandatory</div>

  <label>Payment Type</label>
  <select id="paymentType">
    <option value="">Select</option>
    <option value="MMF">MMF</option>
    <option value="Corpus">Corpus Fund</option>
  </select>

  <div id="mmfDiv" class="hidden">
    <label><span class="red">*</span> Payment for the month</label>
    <input id="mmfMonth" placeholder="e.g. April 2026">
  </div>

  <label>Date of payment</label>
  <input id="paymentDate" placeholder="DD-MM-YYYY">

  <label><span class="red">*</span> Flat No</label>
  <input id="flatNo">

  <label><span class="red">*</span> Owner Name</label>
  <input id="ownerName">

  <label><span class="red">*</span> Amount</label>
  <input type="number" id="amount" min="0">

  <label>Payment Method</label>
  <select id="paymentMethod">
    <option value="">Select</option>
    <option value="Cash">Cash</option>
    <option value="NetBanking">Net Banking</option>
    <option value="App">App</option>
    <option value="Cheque">Cheque</option>
  </select>

  <div id="cashDiv" class="hidden">
    <label>Cash Paid To <span class="red">*</span></label>
    <input id="cashName">
  </div>

  <div id="netDiv" class="hidden">
    <label>Transaction ID <span class="red">*</span></label>
    <input id="netTxn">
  </div>

  <div id="appDiv" class="hidden">
    <label>App Name <span class="red">*</span></label>
    <input id="appName">
    <label>Txn ID <span class="red">*</span></label>
    <input id="appTxn">
  </div>

  <div id="chequeDiv" class="hidden">
    <label>Cheque No <span class="red">*</span></label>
    <input id="chequeNo">
    <label>Bank Name <span class="red">*</span></label>
    <input id="bankName">
  </div>

  <button class="success" id="submitBtn">✅ Submit Details</button>
  <div id="result" class="box hidden"></div>

  <hr>
  <button id="goAdminBtn">Go to Admin</button>
</div>


<!-- ================= ADMIN PAGE ================= -->
<div id="adminPage" class="container hidden">
  <h2>Admin Login</h2>

  <label>Username</label>
  <input id="adminUser" value="">

  <label>Password</label>
  <input id="adminPass" type="password" value="">

  <button class="success" id="adminLoginBtn">Login</button>
  <div id="msg" class="red"></div>

  <button class="secondary" id="backBtn">← Back</button>

  <div id="report" class="hidden card">
    <h3>Download Report</h3>

    <label>From Date (DD-MM-YYYY)</label>
    <input id="fromDate" placeholder="DD-MM-YYYY">

    <label>To Date (DD-MM-YYYY)</label>
    <input id="toDate" placeholder="DD-MM-YYYY">

    <button id="downloadBtn">Download Report</button>
    <button class="warning" id="logoutBtn">Logout</button>

    <div id="sessionMsg" class="red"></div>
  </div>

  <!-- Super user appears only if admin is locked -->
  <div id="superDiv" class="hidden card">
    <h3>Admin Locked 🔒 (Super User Unlock)</h3>

    <label>Super User</label>
    <input id="superUser" value="">

    <label>Super Password</label>
    <input id="superPass" type="password" value="">

    <button class="success" id="superLoginBtn">Unlock</button>

    <div id="superMsg" class="red"></div>

    <div id="adminControlPanel" class="hidden">
      <hr>
      <label>Admin Password (masked)</label>
      <input id="adminPassView" type="password" readonly>

      <label>Reset Admin Password</label>
      <input id="newAdminPassword" type="password" placeholder="Enter new password">

      <button class="warning" id="resetAdminPasswordBtn">Update Admin Password</button>
    </div>
  </div>
</div>


<script>
/* ================== HELPERS ================== */
const $ = (id) => document.getElementById(id);
function show(el){ el.classList.remove("hidden"); }
function hide(el){ el.classList.add("hidden"); }

// DD-MM-YYYY validity
function isDDMMYYYY(s){
  return /^\d{2}-\d{2}-\d{4}$/.test(s);
}

// Normalize DD-MM-YYYY to comparable key YYYYMMDD
function normalizeDDMMYYYY(s){
  if(!isDDMMYYYY(s)) return "";
  const [dd,mm,yyyy] = s.split("-");
  return `${yyyy}${mm}${dd}`;
}

/* ================== STORAGE ================== */
const RECORDS_KEY = "records";
const ADMIN_PASS_KEY = "adminPassStored";

// Always load saved records
let records = JSON.parse(localStorage.getItem(RECORDS_KEY) || "[]");

/* ================== UI DROPDOWNS ================== */
$("paymentType").addEventListener("change", () => {
  if($("paymentType").value === "MMF") $("mmfDiv").style.display = "block";
  else { $("mmfDiv").style.display = "none"; $("mmfMonth").value = ""; }
});

$("paymentMethod").addEventListener("change", () => {
  $("cashDiv").style.display = "none";
  $("netDiv").style.display  = "none";
  $("appDiv").style.display  = "none";
  $("chequeDiv").style.display = "none";

  if($("paymentMethod").value === "Cash") $("cashDiv").style.display = "block";
  if($("paymentMethod").value === "NetBanking") $("netDiv").style.display = "block";
  if($("paymentMethod").value === "App") $("appDiv").style.display = "block";
  if($("paymentMethod").value === "Cheque") $("chequeDiv").style.display = "block";
});

/* ================== SUBMIT DETAILS ================== */
$("submitBtn").addEventListener("click", () => {
  const paymentType = $("paymentType").value;
  const mmfMonth = $("mmfMonth").value.trim();
  const dateStr = $("paymentDate").value.trim();  // DD-MM-YYYY
  const flat = $("flatNo").value.trim();
  const name = $("ownerName").value.trim();
  const amount = $("amount").value;
  const method = $("paymentMethod").value;

  // base mandatory
  if(!flat || !name || !amount || !dateStr){
    alert("Please fill all * fields");
    return;
  }
  if(!isDDMMYYYY(dateStr)){
    alert("Date of payment must be DD-MM-YYYY");
    return;
  }
  if(paymentType === "MMF" && !mmfMonth){
    alert("Please fill Payment for the month");
    return;
  }

  // payment method mandatory
  if(!method){
    alert("Please select Payment Method");
    return;
  }
  if(method === "Cash" && !$("cashName").value.trim()){
    alert("Please fill Cash Paid To");
    return;
  }
  if(method === "NetBanking" && !$("netTxn").value.trim()){
    alert("Please fill Transaction ID");
    return;
  }
  if(method === "App" && (!$("appName").value.trim() || !$("appTxn").value.trim())){
    alert("Please fill App Name and Txn ID");
    return;
  }
  if(method === "Cheque" && (!$("chequeNo").value.trim() || !$("bankName").value.trim())){
    alert("Please fill Cheque No and Bank Name");
    return;
  }

  const ref = Math.floor(Math.random()*1e10);

  const rec = {
    ref,
    paymentType,
    mmfMonth,
    date: dateStr,                 // DD-MM-YYYY stored
    dateKey: normalizeDDMMYYYY(dateStr),
    flat,
    name,
    amount,
    method,
    cashPaidTo: $("cashName").value.trim(),
    netTxn: $("netTxn").value.trim(),
    appName: $("appName").value.trim(),
    appTxn: $("appTxn").value.trim(),
    chequeNo: $("chequeNo").value.trim(),
    bankName: $("bankName").value.trim()
  };

  records.push(rec);
  localStorage.setItem(RECORDS_KEY, JSON.stringify(records));

  $("result").innerHTML = "Submitted ✅ Ref: " + ref;
  show($("result"));
});

/* ================== NAVIGATION ================== */
$("goAdminBtn").addEventListener("click", () => {
  hide($("userPage"));
  show($("adminPage"));
  clearLoginFields();
  updateLockUI();
});

$("backBtn").addEventListener("click", () => {
  hide($("adminPage"));
  show($("userPage"));
  clearLoginFields();
});

/* ================== ADMIN / SUPER USER CRITERIA ================== */
const ADMIN_USER = "admin";
let adminPassStored = localStorage.getItem(ADMIN_PASS_KEY) || "1234";

const SUPER_USER = "super";
const SUPER_PASS = "1234";

let attemptsLeft = 3;
let adminLocked = false;
let sessionTimer = null;

function clearLoginFields(){
  $("adminUser").value = "";
  $("adminPass").value = "";
  $("superUser").value = "";
  $("superPass").value = "";
  $("msg").innerHTML = "";
  $("superMsg").innerHTML = "";
}

function updateLockUI(){
  hide($("report"));
  hide($("adminControlPanel"));

  if(adminLocked){
    $("msg").innerHTML = "Admin Locked ❌";
    show($("superDiv"));
    $("adminLoginBtn").disabled = true;
    $("adminUser").disabled = true;
    $("adminPass").disabled = true;
  } else {
    hide($("superDiv"));
    $("adminLoginBtn").disabled = false;
    $("adminUser").disabled = false;
    $("adminPass").disabled = false;
  }
}

/* ================== ADMIN LOGIN ================== */
$("adminLoginBtn").addEventListener("click", () => {
  if(adminLocked){
    updateLockUI();
    return;
  }

  if($("adminUser").value === ADMIN_USER && $("adminPass").value === adminPassStored){
    $("msg").innerHTML = "Login Success ✅";
    show($("report"));

    // 120 sec session expiry
    if(sessionTimer) clearTimeout(sessionTimer);
    $("sessionMsg").innerHTML = "Session active (expires in 120 seconds)";
    sessionTimer = setTimeout(() => {
      $("sessionMsg").innerHTML = "Session expired ⏱";
      doLogout();
    }, 120000);
  } else {
    attemptsLeft--;
    $("msg").innerHTML = "Attempts left: " + attemptsLeft;
    if(attemptsLeft <= 0){
      adminLocked = true;
      updateLockUI();
    }
  }
});

/* ================== LOGOUT ================== */
$("logoutBtn").addEventListener("click", () => doLogout());

function doLogout(){
  if(sessionTimer) clearTimeout(sessionTimer);
  hide($("report"));
  $("msg").innerHTML = "Logged out";
  clearLoginFields();
  attemptsLeft = 3;
}

/* ================== SUPER USER UNLOCK ================== */
$("superLoginBtn").addEventListener("click", () => {
  if($("superUser").value === SUPER_USER && $("superPass").value === SUPER_PASS){
    adminLocked = false;
    attemptsLeft = 3;
    $("msg").innerHTML = "Admin Unlocked ✅";
    $("superMsg").innerHTML = "Super user verified ✅";
    $("adminUser").disabled = false;
    $("adminPass").disabled = false;
    $("adminLoginBtn").disabled = false;

    // show masked admin password to super user
    $("adminPassView").value = adminPassStored;
    show($("adminControlPanel"));
  } else {
    $("superMsg").innerHTML = "Invalid Super User Credentials ❌";
  }
});

$("resetAdminPasswordBtn").addEventListener("click", () => {
  const np = $("newAdminPassword").value.trim();
  if(!np){
    alert("Enter new password");
    return;
  }
  adminPassStored = np;
  localStorage.setItem(ADMIN_PASS_KEY, np);
  $("adminPassView").value = np;
  alert("Admin Password Updated ✅");
});

/* ================== REPORT DOWNLOAD ================== */
$("downloadBtn").addEventListener("click", () => {
  const fromStr = $("fromDate").value.trim();
  const toStr = $("toDate").value.trim();

  if(!isDDMMYYYY(fromStr) || !isDDMMYYYY(toStr)){
    alert("Enter From/To Date in DD-MM-YYYY");
    return;
  }

  const fromKey = normalizeDDMMYYYY(fromStr);
  const toKey = normalizeDDMMYYYY(toStr);

  // reload latest saved records
  const latest = JSON.parse(localStorage.getItem(RECORDS_KEY) || "[]");

  let csv = "Ref,Date,Flat,Name,Amount,PaymentType,PaymentForMonth,Method,CashPaidTo,TxnID,AppName,AppTxnID,ChequeNo,BankName\n";
  let found = false;

  latest.forEach(r => {
    if(r.dateKey >= fromKey && r.dateKey <= toKey){
      found = true;
      csv += `${r.ref},${r.date},${r.flat},${r.name},${r.amount},${r.paymentType},${(r.mmfMonth||"")},${r.method},${(r.cashPaidTo||"")},${(r.netTxn||"")},${(r.appName||"")},${(r.appTxn||"")},${(r.chequeNo||"")},${(r.bankName||"")}\n`;
    }
  });

  if(!found){
    alert("No records found for selected date range");
    return;
  }

  const blob = new Blob([csv], {type:"text/csv"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "Report.csv";
  a.click();
});
</script>

</body>
</html>
